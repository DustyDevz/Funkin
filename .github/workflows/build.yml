name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-deps:
    name: Build Dependencies
    runs-on: windows-latest
    outputs:
      cache-hit: ${{ steps.cache-deps.outputs.cache-hit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache built dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: deps-install
          key: ${{ runner.os }}-deps-${{ hashFiles('funkin/third_party/**') }}

      - name: Build bgfx + SDL
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cmake -B build-deps -S . `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX=deps-install `
            -DONLY_BUILD_DEPS=ON
          cmake --build build-deps -j 4

  build-game:
    name: Build Game
    runs-on: windows-latest
    needs: build-deps

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: 'Vulkan-Headers, Vulkan-Loader'
          vulkan-use-cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.4
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Restore built dependencies
        uses: actions/cache@v4
        with:
          path: deps-install
          key: ${{ runner.os }}-deps-${{ hashFiles('funkin/third_party/**') }}

      - name: Configure CMake
        run: |
          cmake -B .cmake/windows-release -S . `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Build
        run: cmake --build .cmake/windows-release --config Release -j 4
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Funkin-Windows
          path: export/release/FNFCPP.exe
