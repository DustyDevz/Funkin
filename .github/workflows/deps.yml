name: Deps

on:
  push:
    paths:
      - "funkin/third_party/**"
      - ".gitmodules"
  workflow_dispatch:

jobs:
  deps:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Build deps
        run: |
          cmake -B build-deps -S . -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=deps-install -DONLY_BUILD_DEPS=ON -DBGFX_BUILD_EXAMPLES=OFF -DBGFX_BUILD_TOOLS=OFF -DBGFX_BUILD_TESTS=OFF
          cmake --build build-deps -j 16

      - uses: actions/upload-artifact@v4
        with:
          name: deps-install
          path: deps-install
